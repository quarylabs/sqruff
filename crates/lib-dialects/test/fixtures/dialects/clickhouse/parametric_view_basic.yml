file:
- statement:
  - create_view_statement:
    - create_view_statement:
      - keyword: CREATE
      - keyword: VIEW
      - table_reference:
        - naked_identifier: param_view
      - keyword: AS
      - select_statement:
        - select_clause:
          - keyword: SELECT
          - select_clause_element:
            - column_reference:
              - naked_identifier: id
          - comma: ','
          - select_clause_element:
            - column_reference:
              - naked_identifier: name
        - from_clause:
          - keyword: FROM
          - from_expression:
            - from_expression_element:
              - table_expression:
                - table_reference:
                  - naked_identifier: table1
        - where_clause:
          - keyword: WHERE
          - expression:
            - column_reference:
              - naked_identifier: status
            - comparison_operator:
              - raw_comparison_operator: =
            - parametric_expression:
              - start_curly_bracket: '{'
              - naked_identifier: param1
              - colon: ':'
              - data_type:
                - data_type_identifier: String
              - end_curly_bracket: '}'
            - binary_operator: AND
            - column_reference:
              - naked_identifier: count
            - comparison_operator:
              - raw_comparison_operator: '>'
            - parametric_expression:
              - start_curly_bracket: '{'
              - naked_identifier: param2
              - colon: ':'
              - data_type:
                - data_type_identifier: UInt32
              - end_curly_bracket: '}'
- statement_terminator: ;
