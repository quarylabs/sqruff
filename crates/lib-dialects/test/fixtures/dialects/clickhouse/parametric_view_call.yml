file:
- statement:
  - select_statement:
    - select_clause:
      - keyword: SELECT
      - select_clause_element:
        - wildcard_expression:
          - wildcard_identifier:
            - star: '*'
    - from_clause:
      - keyword: FROM
      - from_expression:
        - from_expression_element:
          - table_expression:
            - function:
              - function_name:
                - function_name_identifier: param_view
              - function_contents:
                - bracketed:
                  - start_bracket: (
                  - expression:
                    - column_reference:
                      - naked_identifier: param1
                    - comparison_operator:
                      - raw_comparison_operator: =
                    - parametric_expression:
                      - start_curly_bracket: '{'
                      - naked_identifier: param1
                      - colon: ':'
                      - data_type:
                        - data_type_identifier: String
                      - end_curly_bracket: '}'
                  - comma: ','
                  - expression:
                    - column_reference:
                      - naked_identifier: param2
                    - comparison_operator:
                      - raw_comparison_operator: =
                    - parametric_expression:
                      - start_curly_bracket: '{'
                      - naked_identifier: param2
                      - colon: ':'
                      - data_type:
                        - data_type_identifier: UInt32
                      - end_curly_bracket: '}'
                  - end_bracket: )
- statement_terminator: ;
