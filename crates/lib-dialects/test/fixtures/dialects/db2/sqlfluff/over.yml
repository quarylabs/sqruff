file:
- statement:
  - select_statement:
    - select_clause:
      - keyword: SELECT
      - select_clause_element:
        - function:
          - function_name:
            - function_name_identifier: RANK
          - function_contents:
            - bracketed:
              - start_bracket: (
              - end_bracket: )
          - over_clause:
            - keyword: OVER
            - bracketed:
              - start_bracket: (
              - window_specification:
                - partitionby_clause:
                  - keyword: PARTITION
                  - keyword: BY
                  - expression:
                    - column_reference:
                      - naked_identifier: ABCD
                - orderby_clause:
                  - keyword: ORDER
                  - keyword: BY
                  - column_reference:
                    - naked_identifier: EFGH
                  - keyword: DESC
              - end_bracket: )
        - alias_expression:
          - alias_operator:
            - keyword: AS
          - naked_identifier: A_RANK
    - from_clause:
      - keyword: FROM
      - from_expression:
        - from_expression_element:
          - table_expression:
            - table_reference:
              - naked_identifier: A_TABLE
- statement_terminator: ;
