file:
- statement:
  - select_statement:
    - select_clause:
      - keyword: SELECT
      - select_clause_element:
        - column_reference:
          - naked_identifier: col1
    - from_clause:
      - keyword: FROM
      - from_expression:
        - from_expression_element:
          - table_expression:
            - table_reference:
              - naked_identifier: test
    - where_clause:
      - keyword: WHERE
      - expression:
        - column_reference:
          - naked_identifier: col1
        - keyword: LIKE
        - quoted_literal: '''%sql'''
- statement_terminator: ;
