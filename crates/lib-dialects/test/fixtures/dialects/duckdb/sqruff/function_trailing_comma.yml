file:
- statement:
  - select_statement:
    - select_clause:
      - keyword: SELECT
      - select_clause_element:
        - function:
          - function_name:
            - function_name_identifier: list_value
          - function_contents:
            - bracketed:
              - start_bracket: (
              - expression:
                - numeric_literal: '1'
              - comma: ','
              - expression:
                - numeric_literal: '2'
              - comma: ','
              - expression:
                - numeric_literal: '3'
              - comma: ','
              - end_bracket: )
        - alias_expression:
          - keyword: AS
          - naked_identifier: nums
      - comma: ','
      - select_clause_element:
        - function:
          - function_name:
            - function_name_identifier: COALESCE
          - function_contents:
            - bracketed:
              - start_bracket: (
              - expression:
                - column_reference:
                  - naked_identifier: a
              - comma: ','
              - expression:
                - column_reference:
                  - naked_identifier: b
              - comma: ','
              - expression:
                - column_reference:
                  - naked_identifier: c
              - comma: ','
              - end_bracket: )
        - alias_expression:
          - keyword: AS
          - naked_identifier: first_non_null
    - from_clause:
      - keyword: FROM
      - from_expression:
        - from_expression_element:
          - table_expression:
            - table_reference:
              - naked_identifier: my_table
- statement_terminator: ;
