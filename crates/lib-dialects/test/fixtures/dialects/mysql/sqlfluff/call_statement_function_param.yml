file:
- statement:
  - call_segment:
    - keyword: CALL
    - naked_identifier: somefunction
    - bracketed:
      - start_bracket: (
      - function:
        - function_name:
          - function_name_identifier: test
        - function_contents:
          - bracketed:
            - start_bracket: (
            - expression:
              - quoted_literal: '''something'''
            - end_bracket: )
      - end_bracket: )
- statement_terminator: ;
