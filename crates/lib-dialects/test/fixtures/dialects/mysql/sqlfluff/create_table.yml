file:
- statement:
  - create_table_statement:
    - keyword: CREATE
    - keyword: TABLE
    - table_reference:
      - quoted_identifier: '`foo`'
    - bracketed:
      - start_bracket: (
      - column_definition:
        - naked_identifier: b
        - data_type:
          - data_type_identifier: VARCHAR
          - bracketed_arguments:
            - bracketed:
              - start_bracket: (
              - numeric_literal: '255'
              - end_bracket: )
          - keyword: BINARY
      - comma: ','
      - column_definition:
        - quoted_identifier: '`id`'
        - data_type:
          - data_type_identifier: int
          - bracketed_arguments:
            - bracketed:
              - start_bracket: (
              - numeric_literal: '11'
              - end_bracket: )
          - keyword: unsigned
        - column_constraint_segment:
          - keyword: NOT
          - keyword: 'NULL'
        - column_constraint_segment:
          - keyword: AUTO_INCREMENT
      - comma: ','
      - table_constraint:
        - keyword: PRIMARY
        - keyword: KEY
        - bracketed:
          - start_bracket: (
          - column_reference:
            - quoted_identifier: '`id`'
          - end_bracket: )
      - end_bracket: )
    - parameter: ENGINE
    - comparison_operator:
      - raw_comparison_operator: =
    - parameter: InnoDB
    - keyword: DEFAULT
    - parameter: CHARSET
    - comparison_operator:
      - raw_comparison_operator: =
    - parameter: utf8mb4
    - parameter: COLLATE
    - comparison_operator:
      - raw_comparison_operator: =
    - parameter: utf8mb4_unicode_ci
- statement_terminator: ;
