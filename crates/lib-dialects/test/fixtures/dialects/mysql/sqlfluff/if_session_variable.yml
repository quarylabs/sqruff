file:
- multi_statement_segment:
  - if_statement:
    - keyword: if
    - expression:
      - bracketed:
        - start_bracket: (
        - expression:
          - column_reference:
            - at_sign_literal: '@x'
          - comparison_operator:
            - raw_comparison_operator: =
          - numeric_literal: '0'
        - end_bracket: )
    - keyword: then
    - if_statements:
      - statement:
        - set_statement:
          - keyword: set
          - at_sign_literal: '@b'
          - comparison_operator:
            - raw_comparison_operator: =
          - expression:
            - quoted_literal: ''''''
      - statement_terminator: ;
      - statement:
        - select_statement:
          - select_clause:
            - keyword: select
            - select_clause_element:
              - numeric_literal: '1'
      - statement_terminator: ;
    - keyword: end
    - keyword: if
- statement_terminator: ;
