file:
- multi_statement_segment:
  - loop_statement:
    - keyword: loop
    - loop_statements:
      - statement:
        - select_statement:
          - select_clause:
            - keyword: select
            - select_clause_element:
              - numeric_literal: '1'
      - statement_terminator: ;
      - statement:
        - select_statement:
          - select_clause:
            - keyword: select
            - select_clause_element:
              - wildcard_expression:
                - wildcard_identifier:
                  - star: '*'
          - from_clause:
            - keyword: from
            - from_expression:
              - from_expression_element:
                - table_expression:
                  - table_reference:
                    - naked_identifier: onetable
      - statement_terminator: ;
    - keyword: end
    - keyword: loop
- statement_terminator: ;
