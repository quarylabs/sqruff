file:
- statement:
  - create_table_statement:
    - keyword: CREATE
    - keyword: TABLE
    - table_reference:
      - naked_identifier: properties
    - bracketed:
      - start_bracket: (
      - column_definition:
        - naked_identifier: key
        - data_type:
          - data_type_identifier: TEXT
      - end_bracket: )
- statement_terminator: ;
