rule: CV03

test_require_pass:
  pass_str: SELECT a, b, FROM foo
  configs:
    rules:
      convention.select_trailing_comma:
        select_clause_trailing_comma: require

test_require_fail:
  fail_str: SELECT a, b FROM foo
  fix_str: SELECT a, b, FROM foo
  configs:
    rules:
      convention.select_trailing_comma:
        select_clause_trailing_comma: require


test_forbid_pass:
  pass_str: SELECT a, b FROM foo
  configs:
    rules:
      convention.select_trailing_comma:
        select_clause_trailing_comma: forbid

test_forbid_fail:
  fail_str: SELECT a, b, FROM foo
  fix_str: SELECT a, b FROM foo
  configs:
    rules:
      convention.select_trailing_comma:
        select_clause_trailing_comma: forbid

# test_fail_templated (SQLFluff): a trailing comma produced inside a Jinja loop
# must be flagged but NOT fixed, because every iteration shares one source
# position and removing it would break the other iterations. This harness can't
# express "fixed file is unchanged" (`violations_after_fix`) and needs the Jinja
# templater, so the behaviour is covered by unit tests in
# crates/lib/src/rules/convention/cv03.rs instead.
