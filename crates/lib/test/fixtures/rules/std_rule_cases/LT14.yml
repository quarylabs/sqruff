rule: LT14

test_pass_default_from_clause:
  pass_str: |
    SELECT foo FROM bar

test_fail_default_where_clause:
  fail_str: |
    SELECT foo FROM bar WHERE x = 4
  fix_str: |
    SELECT foo FROM bar
    WHERE x = 4

test_fail_default_groupby_clause:
  fail_str: |
    SELECT foo FROM bar
    WHERE x = 4 GROUP BY y
  fix_str: |
    SELECT foo FROM bar
    WHERE x = 4
    GROUP BY y

test_fail_default_having_clause:
  fail_str: |
    SELECT foo FROM bar
    GROUP BY y HAVING COUNT(*) > 1
  fix_str: |
    SELECT foo FROM bar
    GROUP BY y
    HAVING COUNT(*) > 1

test_fail_default_outer_orderby_clause:
  fail_str: |
    SELECT foo
    FROM bar
    WHERE x = 4 ORDER BY y
  fix_str: |
    SELECT foo
    FROM bar
    WHERE x = 4
    ORDER BY y

test_pass_leading_from_clause:
  pass_str: |
    SELECT foo
    FROM bar
  configs:
    layout:
      type:
        from_clause:
          keyword_line_position: leading

test_fail_alone_from_clause:
  fail_str: |
    SELECT foo FROM bar
  fix_str: |
    SELECT foo
    FROM
    bar
  configs:
    layout:
      type:
        from_clause:
          keyword_line_position: alone

test_fail_alone_join_clause:
  fail_str: |
    SELECT foo
    FROM bar a JOIN baz b
    ON a.id = b.id INNER JOIN qux c
    ON a.id = c.id LEFT OUTER JOIN quux d
    ON a.id = d.id
  fix_str: |
    SELECT foo
    FROM bar a
    JOIN
    baz b
    ON a.id = b.id
    INNER JOIN
    qux c
    ON a.id = c.id
    LEFT OUTER JOIN
    quux d
    ON a.id = d.id
  configs:
    layout:
      type:
        join_clause:
          keyword_line_position: alone

test_fail_leading_join_clause_on_condition:
  fail_str: |
    SELECT foo
    FROM bar a JOIN baz b ON a.id = b.id
  fix_str: |
    SELECT foo
    FROM bar a
    JOIN baz b
    ON a.id = b.id
  configs:
    layout:
      type:
        join_clause:
          keyword_line_position: leading
        join_on_condition:
          keyword_line_position: leading

test_fail_leading_join_clause_trailing_on_condition:
  fail_str: |
    SELECT foo
    FROM bar a JOIN baz b ON a.id = b.id
  fix_str: |
    SELECT foo
    FROM bar a
    JOIN baz b ON
    a.id = b.id
  configs:
    layout:
      type:
        join_clause:
          keyword_line_position: leading
        join_on_condition:
          keyword_line_position: trailing

test_pass_leading_orderby_except_window_function:
  pass_str: |
    SELECT
    a,
    b,
    ROW_NUMBER() OVER (PARTITION BY c ORDER BY d) AS e
    FROM f
    JOIN g
    ON g.h = f.h
  configs:
    layout:
      type:
        orderby_clause:
          keyword_line_position: leading
          keyword_line_position_exclusions: window_specification

test_fail_leading_window_function:
  fail_str: |
    SELECT
    a,
    b,
    ROW_NUMBER() OVER (PARTITION BY c ORDER BY d) AS e
    FROM f
    JOIN g
    ON g.h = f.h
  fix_str: |
    SELECT
    a,
    b,
    ROW_NUMBER() OVER (
    PARTITION BY c
    ORDER BY d) AS e
    FROM f
    JOIN g
    ON g.h = f.h
  configs:
    layout:
      type:
        partitionby_clause:
          keyword_line_position: leading
        orderby_clause:
          keyword_line_position: leading
          keyword_line_position_exclusions: None

test_pass_none_where_clause:
  pass_str: |
    SELECT a, b FROM tabx WHERE b = 2;
  configs:
    layout:
      type:
        where_clause:
          keyword_line_position: none
